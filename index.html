<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      user-scalable=no
    "
  >

  <title>WebAR Purple Dragon - AR.js</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>

    html,
    body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    /* Sửa lỗi camera bị zoom/phóng */
    video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

  </style>
</head>

<body>

<a-scene

  vr-mode-ui="enabled: false"

  renderer="
    antialias: true;
    alpha: true;
    precision: mediump;
    logarithmicDepthBuffer: true;
    colorManagement: true;
  "

  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
  "
>

  <!-- ===================== -->
  <!-- ASSETS -->
  <!-- ===================== -->

  <a-assets>

    <a-asset-item
      id="dragonModel"
      src="./assets/purple_dragon.glb">
    </a-asset-item>

  </a-assets>


  <!-- ===================== -->
  <!-- LIGHT -->
  <!-- ===================== -->

  <a-entity
    light="
      type: ambient;
      intensity: 1.5
    ">
  </a-entity>

  <a-entity
    light="
      type: directional;
      intensity: 2
    "
    position="1 1 1">
  </a-entity>


  <!-- ===================== -->
  <!-- MARKER -->
  <!-- ===================== -->

  <a-marker preset="hiro">

    <!-- MODEL -->

    <a-entity

      gltf-model="#dragonModel"

      position="-0.05 0.15 0"

      scale="1.2 1.2 1.2"

      rotation="0 0 0"

      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 10000;
        easing: linear;
      "
    >
    </a-entity>

  </a-marker>


  <!-- ===================== -->
  <!-- CAMERA -->
  <!-- ===================== -->

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
