<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      minimum-scale=1.0,
      maximum-scale=1.0
    "
  >

  <title>WebAR Purple Dragon - AR.js</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"

  renderer="
    logarithmicDepthBuffer: true;
    colorManagement: true;
  "

  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
  "
>

  <!-- ===================== -->
  <!-- ASSETS -->
  <!-- ===================== -->

  <a-assets>

    <a-asset-item
      id="dragonModel"
      src="./assets/purple_dragon.glb">
    </a-asset-item>

  </a-assets>


  <!-- ===================== -->
  <!-- LIGHT -->
  <!-- ===================== -->

  <a-entity
    light="type: ambient; intensity: 1.2">
  </a-entity>

  <a-entity
    light="type: directional; intensity: 1"
    position="1 1 1">
  </a-entity>


  <!-- ===================== -->
  <!-- MARKER -->
  <!-- ===================== -->

  <a-marker preset="hiro">

    <!-- GLB MODEL -->
    <a-entity
      gltf-model="#dragonModel"

      position="0 0.5 0"

      scale="3 3 3"

      rotation="0 0 0"

      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 8000;
        easing: linear;
      "
    >
    </a-entity>

  </a-marker>


  <!-- ===================== -->
  <!-- CAMERA -->
  <!-- ===================== -->

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
