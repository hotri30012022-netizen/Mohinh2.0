<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <meta
      name="viewport"
      content="
        width=device-width,
        initial-scale=1.0,
        minimum-scale=1.0,
        maximum-scale=1.0
      "
    >

    <title>WebAR Mô Hình Triceratops - AR.js</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      arjs="
        sourceType: webcam;
        debugUIEnabled: false;
      "
    >

      <!-- Assets -->
      <a-assets>

        <a-asset-item
          id="bird-obj"
          src="./assets/running_triceratop.usdz">
        </a-asset-item>

        <a-asset-item
          id="bird-mtl"
          src="./assets/running_triceratop.glb">
        </a-asset-item>

      </a-assets>


      <!-- Marker Hiro -->
      <a-marker preset="hiro">

        <!-- Mô hình 3D -->
        <a-obj-model
          src="#bird-obj"
          mtl="#bird-mtl"

          position="0 0 0"

          scale="0.05 0.05 0.05"

          rotation="-90 0 0"

          animation="
            property: rotation;
            from: -90 0 0;
            to: -90 360 0;
            loop: true;
            dur: 8000;
            easing: linear;
          "
        >
        </a-obj-model>

      </a-marker>


      <!-- Camera -->
      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
